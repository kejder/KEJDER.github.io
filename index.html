<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kerem | Web Sitesi</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }
        header {
            background: #020617;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        nav {
            margin-top: 10px;
        }
        nav a {
            color: #38bdf8;
            margin: 0 10px;
            text-decoration: none;
        }
        .hero {
            text-align: center;
            padding: 80px 20px;
        }
        .hero h2 {
            font-size: 40px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #38bdf8;
            color: black;
            border-radius: 5px;
            text-decoration: none;
        }
        .section {
            padding: 50px 20px;
            text-align: center;
        }
        .projects {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
        }
    </style>
</head>
<body>

<header>
    <h1>Kerem Yürük</h1>
    <nav>
        <a href="#">Ana Sayfa</a>
        <a href="#">Projeler</a>
        <a href="#">İletişim</a>
    </nav>
</header>

<section class="hero">
    <h2>Yazılım ve Web Geliştirici</h2>
    <p>Kendi projelerimi geliştiriyorum ve öğreniyorum.</p>
    <a href="#" class="btn">Projelerimi Gör</a>
</section>

<section class="section">
    <h2>Projelerim</h2>
    <div class="projects">
        <div class="card">
            <h3>Proje 1</h3>
            <p>Basit web sitesi</p>
        </div>
        <div class="card">
            <h3>Proje 2</h3>
            <p>Python uygulaması</p>
        </div>
        <div class="card">
            <h3>Proje 3</h3>
            <p>Yakında...</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Kerem Yürük</p>
</footer>

</body>
</html>
